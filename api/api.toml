# Pipelex-API deployment config — the packaged default, loaded by `load_api_config()`
# (api/api_config.py) via core's env-aware `load_plugin_config` and validated into `ApiConfig`.
# Keys live at the file root (no `[api]` wrapper) — `load_plugin_config` validates the whole merged
# document against the schema, exactly like `pipelex-temporal`'s `temporal.toml`. The packaged
# default here is deep-merged with an optional `api_{env}.toml` / `api_override.toml` at `~/.pipelex`
# then the project `.pipelex` (env selected by `PIPELEX_ENV`). This open-source base names NO
# orchestrator: it ships the in-process `direct` mode and refuses per-request override. A deployment
# flavor bakes its own `.pipelex/api_{env}.toml` to flip these (e.g. `pipelex-api-hosted` sets
# `execution_mode = "temporal_fire_and_forget"`).

# Which mode a top-level `POST /start` dispatches as, through the orchestrator registry. One of the
# `PipelexExecutionMode` values: "direct", "temporal_blocking", "temporal_fire_and_forget",
# "mistral_native". A mode whose orchestrator plugin is not installed fails loud at dispatch with the
# plugin's install hint.
execution_mode = "direct"

# Whether a caller may override `execution_mode` per request. Off on the base (and recommended off on
# hosted flavors): a locked-down distributed runner must not be coercible into `direct`.
allow_request_execution_mode_override = false
