name: Deploy Documentation

on:
  push:
    branches: main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install MkDocs and plugins via uv extras
        run: uv sync --frozen --extra docs

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force --clean
