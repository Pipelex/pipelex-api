          anyOf:
          - type: string
          - type: 'null'
          title: Result
        nb_output:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nb Output
        multiple_output:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Multiple Output
        batch_over:
          anyOf:
          - type: string
          - type: 'null'
          title: Batch Over
        batch_as:
          anyOf:
          - type: string
          - type: 'null'
          title: Batch As
      additionalProperties: false
      type: object
      required:
      - pipe
      title: SubPipeBlueprint
    TagStyle:
      type: string
      enum:
      - no_tag
      - ticks
      - xml
      - square_brackets
      title: TagStyle
    TemplateBlueprint:
      properties:
        template:
          type: string
          title: Template
          description: Raw template source
        templating_style:
          anyOf:
          - $ref: '#/components/schemas/TemplatingStyle'
          - type: 'null'
          description: Style of prompting to use (typically for different LLMs)
        category:
          $ref: '#/components/schemas/TemplateCategory'
          description: Category of the template (could also be HTML, MARKDOWN, MERMAID, etc.), influences template rendering
            rules
        extra_context:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Extra Context
          description: Additional context variables for template rendering
      type: object
      required:
      - template
      - category
      title: TemplateBlueprint
    TemplateCategory:
      type: string
      enum:
      - basic
      - expression
      - html
      - markdown
      - mermaid
      - llm_prompt
      - img_gen_prompt
      title: TemplateCategory
    TemplatingStyle:
      properties:
        tag_style:
          $ref: '#/components/schemas/TagStyle'
        text_format:
          $ref: '#/components/schemas/TextFormat'
          default: plain
      type: object
      required:
      - tag_style
      title: TemplatingStyle
    TextFormat:
      type: string
      enum:
      - plain
      - markdown
      - html
      - json
      title: TextFormat
    TimingSpec:
      properties:
        started_at:
          type: string
          format: date-time
          title: Started At
        ended_at:
          type: string
          format: date-time
          title: Ended At
        duration:
          type: number
          title: Duration
          description: Duration in seconds, included in JSON serialization.
          readOnly: true
      additionalProperties: false
      type: object
      required:
      - started_at
      - ended_at
      - duration
      title: TimingSpec
      description: Timing information for a node execution.
    TokenCategory:
      type: string
      enum:
      - input
      - input_cached
      - input_non_cached
      - input_joined
      - input_audio
      - output
      - output_audio
      - output_reasoning
      - output_accepted_prediction
      - output_rejected_prediction
      title: TokenCategory
    TraceContext:
      properties:
        graph_id:
          type: string
          title: Graph Id
          description: Unique identifier for this execution trace (typically the pipeline run id)
        tracer_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Tracer Key
          description: Lookup key in GraphTracerManager. Defaults to graph_id when None.
        parent_node_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Node Id
          description: Node ID of the parent pipe, None for root
        node_sequence:
          type: integer
          title: Node Sequence
          description: Monotonic counter for generating node IDs
          default: 0
        data_inclusion:
          $ref: '#/components/schemas/DataInclusionConfig'
          description: Controls which data formats to capture
        emit_graph_events:
          type: boolean
          title: Emit Graph Events
          description: Whether to emit graph (node/edge) trace events
          default: true
        emit_usage_events:
          type: boolean
          title: Emit Usage Events
          description: Whether to emit usage (cost) trace events
          default: true
      additionalProperties: false
      type: object
      required:
      - graph_id
      - data_inclusion
      title: TraceContext
      description: "Serializable per-execution trace context passed through JobMetadata.\n\nTracks parent-child relationships\
        \ as pipes execute, building the node tree that\nboth the graph stream (edges) and the usage stream (cost attribution)\
        \ read from.\nDesigned to be serializable for distributed environments where contextvars don't work.\n\nAttributes:\n\
        \    graph_id: Unique identifier for this execution trace (typically pipeline_run_id).\n    parent_node_id: The node\
        \ ID of the parent pipe (None for root). The shared anchor ŌĆö\n        read by the graph stream (edges) and the usage\
        \ stream (cost attribution).\n    node_sequence: Monotonic counter for generating unique node IDs within this trace.\n\
        \    data_inclusion: Configuration controlling which data formats to capture in IOSpec fields.\n    emit_graph_events:\
        \ Whether graph (node/edge) trace events should be emitted for this run\n        (driven by ``is_generate_graph``).\
        \ The in-memory tracer always accumulates; this only\n        gates event emission onto the shared event-log transport.\n\
        \    emit_usage_events: Whether usage (cost) trace events should be emitted for this run\n        (driven by ``is_generate_usage``).\
        \ Independent of ``emit_graph_events`` so cost reporting\n        survives ``--no-graph``."
    UnitJobId:
      type: string
      enum:
      - llm_gen_text
      - llm_gen_object
      - img_gen_text_to_image
      - extract_pages
      - search_sourced_answer
      - search_structured
      title: UnitJobId
    UploadRequest:
      properties:
        filename:
          type: string
          maxLength: 512
          title: Filename
          description: Original filename with extension (e.g. 'resume.pdf')
        data:
          type: string
          maxLength: 69905071
          title: Data
          description: File content as base64-encoded string (max 50 MiB decoded)
        content_type:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Content Type
          description: MIME type (e.g. 'application/pdf')
      additionalProperties: false
      type: object
      required:
      - filename
      - data
      title: UploadRequest
    UploadResponse:
      properties:
        uri:
          type: string
          title: Uri
          description: pipelex-storage:// URI for the uploaded file
        filename:
          type: string
          title: Filename
          description: Original filename
      type: object
      required:
      - uri
      - filename
      title: UploadResponse
    ValidateRequest:
      properties:
        mthds_contents:
          items:
            type: string
          type: array
          maxItems: 16
          minItems: 1
          title: Mthds Contents
          description: MTHDS contents to load (always an array, even for a single file).
        allow_signatures:
          type: boolean
          title: Allow Signatures
          description: When true, the validation sweep tolerates unimplemented pipe signatures instead of rejecting the bundle
            (signatures dry-run trivially by minting a mock). Defaults to false (strict).
          default: false
      type: object
      required:
      - mthds_contents
      title: ValidateRequest
      description: '`/validate` needs nothing beyond the shared `mthds_contents` + `allow_signatures` payload.'
    ValidateResponse:
      properties:
        bundle_blueprint:
          $ref: '#/components/schemas/PipelexBundleBlueprint'
        pipe_structures:
          additionalProperties:
            $ref: '#/components/schemas/PipeIOContract'
          type: object
          title: Pipe Structures
        graph_spec:
          anyOf:
          - $ref: '#/components/schemas/GraphSpec'
          - type: 'null'
        validated_pipes:
          items:
            $ref: '#/components/schemas/ValidatedPipeEntry'
          type: array
          title: Validated Pipes
        pending_signatures:
          items:
            type: string
          type: array
          title: Pending Signatures
        is_runnable:
          type: boolean
          title: Is Runnable
          default: true
        mthds_contents:
          items:
            type: string
          type: array
          title: Mthds Contents
          description: The MTHDS contents that were validated (echo of the request)
        success:
          type: boolean
          title: Success
          description: Whether the validation was successful
          default: true
        message:
          type: string
          title: Message
          description: Status message
          default: MTHDS content validated successfully
      additionalProperties: true
      type: object
      required:
      - bundle_blueprint
      - mthds_contents
      title: ValidateResponse
      description: 'The canonical `PipelexValidationReport` plus this server''s wire-only extras.


        The report fields are inherited ŌĆö typed models, identical to what the local runtime

        returns for the same bundle. The extras exist for HTTP clients only (the webapp gates

        UI on `success` and reads back `mthds_contents`); they are NOT part of the canonical

        report and no in-process consumer should depend on them.'
    ValidatedPipeEntry:
      properties:
        pipe_ref:
          type: string
          title: Pipe Ref
        status:
          $ref: '#/components/schemas/DryRunStatus'
      additionalProperties: true
      type: object
      required:
      - pipe_ref
      - status
      title: ValidatedPipeEntry
      description: 'One entry in the ``validated_pipes`` JSON envelope returned by the validate surfaces.


        The ``pipe_ref`` key carries the namespaced ``pipe_ref`` (``domain.code``) ŌĆö never the bare code.

        ``status`` is a ``DryRunStatus`` (a ``StrEnum``), so it serializes to its plain string value.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WorkingMemory:
      properties:
        root:
          additionalProperties:
            $ref: '#/components/schemas/Stuff'
          type: object
          title: Root
        aliases:
          additionalProperties:
            type: string
          type: object
          title: Aliases
      additionalProperties: false
      type: object
      title: WorkingMemory
