          - type: 'null'
        validated_pipes:
          items:
            $ref: '#/components/schemas/ValidatedPipeEntry'
          type: array
          title: Validated Pipes
        warnings:
          items:
            $ref: '#/components/schemas/ValidationErrorItem'
          type: array
          title: Warnings
